[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hype-defense"
version = "0.1.0"
description = "HyPE: Hyperbolic Prompt Detection and Sanitization (ICLR 2026)"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE.txt" }
authors = [{ name = "HyPE-VLM" }]
dependencies = [
  "torch",
  "transformers>=4.31.0",
  "accelerate",
  "numpy",
  "peft",
  "bitsandbytes",
  "huggingface-hub",
  "tokenizers",
  "safetensors",
  "loguru"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["."]
include = ["hype*", "HySAC*", "HyperbolicSVDD*"]

[tool.setuptools.package-data]
hype = ["assets/*.pth"]
